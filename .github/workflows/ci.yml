name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff critical set)
    runs-on: ubuntu-latest
    env:
      RUFF_TARGETS: >-
        elite_runtime.py
        elite_quality_history.py
        run_full_e2e_flow.py
        run_release_gate.py
        test_production_blindspots.py
        test_security_and_perf.py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install ruff
      - run: python -m ruff check $RUFF_TARGETS --select F,B --ignore B007,B008,B904,B905

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install mypy numpy
      - run: python -m mypy --ignore-missing-imports elite_runtime.py elite_quality_history.py run_release_gate.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit/integration tests
        env:
          ELITE_OUTPUT_ROOT: /tmp/color_test_runs
          ELITE_HISTORY_DB: /tmp/color_test_quality.sqlite
          ELITE_INNOVATION_DB: /tmp/color_test_innovation.sqlite
          ELITE_ENABLE_AUDIT_LOG: "false"
          ELITE_ENABLE_API_KEY_AUTH: "false"
        run: |
          python -m pytest test_production_blindspots.py -v --tb=short
          python -m pytest test_security_and_perf.py -v --tb=short

  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run release gate
        env:
          ELITE_OUTPUT_ROOT: /tmp/color_release_runs
          ELITE_HISTORY_DB: /tmp/color_release_quality.sqlite
          ELITE_INNOVATION_DB: /tmp/color_release_innovation.sqlite
          ELITE_ENABLE_AUDIT_LOG: "false"
        run: python run_release_gate.py --quick-check
